<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZestDrop Iced Tea — Real Brewed. Ice Cold.</title>
<meta name="description" content="ZestDrop Iced Tea — hand-brewed iced tea in five bold flavors, plus merch to match your summer.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

/* ============================= */
/* 1. TOKENS / CSS VARIABLES      */
/* ============================= */
:root{
  /* Wisteria purples */
  --wisteria-50:  #FAF6FD;
  --wisteria-100: #F1E6FB;
  --wisteria-200: #E1CBF4;
  --wisteria-300: #CBA6E8;
  --wisteria-400: #AD7DDB;
  --wisteria-500: #9059CC;
  --wisteria-600: #7240AE;
  --wisteria-700: #5A2F8A;
  --wisteria-800: #432368;
  --wisteria-900: #281347;

  /* Flavor accents */
  --lemon:      #FFC93C;
  --peach:      #FF9966;
  --raspberry:  #E63462;
  --mint:       #2EC4A6;
  --passion:    #FF6F3C;

  /* Tea liquid */
  --tea-light: #E8A33D;
  --tea-dark:  #8C4A1E;

  --ink:   #241433;
  --muted: #6B5A82;
  --paper: #FFFDFB;

  --font-display: 'Poppins', sans-serif;
  --font-body: 'Inter', sans-serif;

  --radius-lg: 1.5rem;
  --radius-md: 1rem;
  --radius-sm: 0.6rem;

  --shadow-soft: 0 10px 30px -12px rgba(90,47,138,0.25);
  --shadow-lift: 0 20px 40px -14px rgba(90,47,138,0.38);

  --header-h: 76px;
  --promo-h: 44px;
}

/* ============================= */
/* 2. RESET / BASE                */
/* ============================= */
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{
  font-family:var(--font-body);
  color:var(--ink);
  background:var(--wisteria-50);
  line-height:1.6;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
img,svg{ display:block; max-width:100%; }
a{ color:inherit; text-decoration:none; }
button{ font-family:inherit; cursor:pointer; border:none; background:none; }
ul{ list-style:none; }
input{ font-family:inherit; }
h1,h2,h3,h4{ font-family:var(--font-display); color:var(--wisteria-900); line-height:1.15; }
section{ position:relative; }
:focus-visible{ outline:3px solid var(--wisteria-400); outline-offset:3px; border-radius:4px; }

.container{
  max-width:1200px;
  margin:0 auto;
  padding:0 1.5rem;
}
.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:.5rem;
  font-family:var(--font-display);
  font-weight:700;
  font-size:.78rem;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--wisteria-600);
  background:var(--wisteria-100);
  padding:.4rem .9rem;
  border-radius:50px;
  margin-bottom:1.1rem;
}
.section-head{
  max-width:640px;
  margin:0 auto 3rem;
  text-align:center;
}
.section-head h2{
  font-size:clamp(1.9rem,4vw,2.8rem);
  font-weight:800;
  margin-bottom:.85rem;
}
.section-head p{
  color:var(--muted);
  font-size:1.05rem;
}

/* Buttons */
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:.5rem;
  font-family:var(--font-display);
  font-weight:700;
  font-size:.95rem;
  padding:.9rem 1.9rem;
  border-radius:50px;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease, background .25s ease;
  white-space:nowrap;
}
.btn-primary{
  background:linear-gradient(135deg,var(--wisteria-500),var(--wisteria-700));
  color:#fff;
  box-shadow:var(--shadow-soft);
}
.btn-primary:hover{
  transform:translateY(-3px) scale(1.03);
  box-shadow:var(--shadow-lift);
}
.btn-primary:active{ transform:translateY(0) scale(.98); }
.btn-ghost{
  background:transparent;
  color:var(--wisteria-700);
  border:2px solid var(--wisteria-300);
}
.btn-ghost:hover{
  background:var(--wisteria-100);
  border-color:var(--wisteria-500);
  transform:translateY(-2px);
}
.btn-add{
  width:100%;
  background:var(--wisteria-900);
  color:#fff;
  padding:.8rem 1rem;
  border-radius:50px;
  font-weight:700;
  font-size:.88rem;
  letter-spacing:.02em;
  transition:transform .2s ease, background .2s ease, box-shadow .2s ease;
}
.btn-add:hover{
  background:var(--wisteria-700);
  transform:translateY(-2px);
  box-shadow:0 12px 22px -8px rgba(40,19,71,0.45);
}
.btn-add:active{ transform:translateY(0) scale(.97); }

/* ============================= */
/* 3. PROMO BANNER                */
/* ============================= */
.promo-banner{
  background:linear-gradient(120deg,var(--wisteria-700),var(--raspberry),var(--wisteria-700));
  background-size:200% 100%;
  animation:bannerShift 7s ease-in-out infinite, bannerPulse 2.6s ease-in-out infinite;
  color:#fff;
  text-align:center;
  font-family:var(--font-display);
  font-weight:700;
  font-size:.82rem;
  letter-spacing:.02em;
  padding:.65rem 1rem;
  min-height:var(--promo-h);
  display:flex;
  align-items:center;
  justify-content:center;
}
@keyframes bannerShift{
  0%{ background-position:0% 50%; }
  50%{ background-position:100% 50%; }
  100%{ background-position:0% 50%; }
}
@keyframes bannerPulse{
  0%,100%{ box-shadow: inset 0 0 0 0 rgba(255,255,255,0); }
  50%{ box-shadow: inset 0 0 40px 0 rgba(255,255,255,0.18); }
}
.promo-banner strong{ font-weight:800; }

/* ... trimmed for brevity ... */
</style>
</head>

  if (location.pathname === '/' || location.pathname.endsWith('/')) {

      fetch('zestdrop-iced-tea.html', { method: 'HEAD' }).then(function(res) {
        if (res.status === 200) return; else location.replace('zestdrop-iced-tea.html');
      }).catch(function(){ location.replace('zestdrop-iced-tea.html'); });
    } catch (e) { location.replace('zestdrop-iced-tea.html'); }
  }
</script>

<main style="padding:2rem">
  <h1>ZestDrop Iced Tea</h1>
  <p>This is a copy of your site saved as index.html to avoid GitHub Pages 404s. The full site is in zestdrop-iced-tea.html.</p>
  <p><a href="zestdrop-iced-tea.html">Open full site</a></p>
</main>

</body>
</html>
